<div class="flex gap-3">
    <div
        class="w-8 h-8 bg-slate-200 rounded-full flex-shrink-0 flex items-center justify-center text-xs font-bold text-slate-600">
        {{comment().commentedBy?.pseudo?.charAt(0)?.toUpperCase()}}
    </div>
    <div class="flex-1 bg-white p-3 rounded-lg border border-slate-100 shadow-sm">
        <div class="flex justify-between items-start mb-1">
            <p class="font-medium text-sm text-slate-800">{{comment().commentedBy?.pseudo}}</p>
            <p class="text-xs text-slate-400">{{comment().date}} à {{comment().hour}}</p>
        </div>
        <p class="text-sm text-slate-600">{{comment().text}}</p>
    </div>
</div>
