<form (submit)="createPost(); $event.preventDefault()"
    class="max-w-2xl mx-auto bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-8">
    <div class="mb-4">
        <textarea placeholder="Quoi de neuf ?" [formField]="postForm.contenu" rows="3"
            class="w-full resize-none border-0 bg-transparent text-slate-800 placeholder-slate-400 focus:ring-0 text-lg focus:outline-none"></textarea>
    </div>
    <div class="flex flex-col sm:flex-row items-center gap-3 border-t border-slate-100 pt-3 mt-2">
        <div class="flex-1 flex gap-2 w-full">
            <input type="text" placeholder="Url de l'image (optionnel)" [formField]="postForm.imageUrl"
                class="flex-1 rounded-lg border border-slate-200 bg-slate-50 text-sm focus:border-indigo-500 focus:bg-white focus:ring-1 focus:ring-indigo-500 px-3 py-2 outline-none transition-colors">
            <input type="text" placeholder="Titre de l'image (optionnel)" [formField]="postForm.imageTitle"
                class="flex-1 rounded-lg border border-slate-200 bg-slate-50 text-sm focus:border-indigo-500 focus:bg-white focus:ring-1 focus:ring-indigo-500 px-3 py-2 outline-none transition-colors">
        </div>
        <button type="submit"
            class="w-full sm:w-auto px-6 py-2 bg-indigo-600 text-white text-sm font-medium rounded-full hover:bg-indigo-700 transition-colors shadow-sm cursor-pointer whitespace-nowrap">
            Créer un post
        </button>
    </div>
</form>

<section class="max-w-2xl mx-auto" infiniteScroll (scrolled)="onScroll()">
    @for(post of posts(); track $index) {
    <app-post [post]="post"></app-post>
    }
</section>
